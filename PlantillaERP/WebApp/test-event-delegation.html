<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Event Delegation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { padding: 20px; background-color: #f5f5f5; }
        .test-container { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .test-header { font-weight: bold; margin-bottom: 10px; }
        .btn-test { margin: 5px; }
        .log-output { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 5px; font-family: monospace; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Prueba de Event Delegation</h1>
        
        <!-- Test 1: Botones simples -->
        <div class="test-container">
            <div class="test-header">Test 1: Event Delegation Básico</div>
            <button class="btn btn-primary btn-test btn-cambiar-rol" data-usuario-id="user1" data-usuario-email="test1@example.com">
                ↔️ Cambiar Rol 1
            </button>
            <button class="btn btn-danger btn-test btn-eliminar-usuario" data-usuario-id="user1" data-usuario-email="test1@example.com">
                🗑️ Eliminar 1
            </button>
            <button class="btn btn-primary btn-test btn-cambiar-rol" data-usuario-id="user2" data-usuario-email="test2@example.com">
                ↔️ Cambiar Rol 2
            </button>
            <button class="btn btn-danger btn-test btn-eliminar-usuario" data-usuario-id="user2" data-usuario-email="test2@example.com">
                🗑️ Eliminar 2
            </button>
        </div>

        <!-- Test 2: Botones con iconos (como en Usuarios.cshtml) -->
        <div class="test-container">
            <div class="test-header">Test 2: Botones con Iconos (HTML real)</div>
            <button class="btn btn-sm btn-warning btn-cambiar-rol" data-usuario-id="admin@erp.com" data-usuario-email="admin@erp.com">
                <i class="fas fa-exchange-alt"></i>
            </button>
            <button class="btn btn-sm btn-danger btn-eliminar-usuario" data-usuario-id="admin@erp.com" data-usuario-email="admin@erp.com">
                <i class="fas fa-trash"></i>
            </button>
        </div>

        <!-- Test 3: Log de eventos -->
        <div class="test-container">
            <div class="test-header">Test 3: Log de Eventos Capturados</div>
            <button class="btn btn-info" onclick="limpiarLog()">Limpiar Log</button>
            <div class="log-output" id="log">
                [Haz clic en los botones arriba para ver los eventos aquí]
            </div>
        </div>

        <!-- Test 4: Console Log -->
        <div class="test-container">
            <div class="test-header">Test 4: Verificación de Consola</div>
            <button class="btn btn-warning" onclick="ejecutarTests()">Ejecutar Tests en Consola</button>
            <p style="margin-top: 10px; color: #666;">Abre F12 → Console para ver los resultados</p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ============================================
        // EVENT DELEGATION - MISMA TÉCNICA QUE EN USUARIOS.CSHTML
        // ============================================
        document.addEventListener('click', function(event) {
            // Botón Cambiar Rol
            if (event.target.closest('.btn-cambiar-rol')) {
                const button = event.target.closest('.btn-cambiar-rol');
                const usuarioId = button.getAttribute('data-usuario-id');
                const usuarioEmail = button.getAttribute('data-usuario-email');
                cambiarRolUsuario(usuarioId, usuarioEmail);
                return;
            }

            // Botón Eliminar Usuario
            if (event.target.closest('.btn-eliminar-usuario')) {
                const button = event.target.closest('.btn-eliminar-usuario');
                const usuarioId = button.getAttribute('data-usuario-id');
                const usuarioEmail = button.getAttribute('data-usuario-email');
                eliminarUsuario(usuarioId, usuarioEmail);
                return;
            }
        });

        // ============================================
        // FUNCIONES DE PRUEBA
        // ============================================
        function cambiarRolUsuario(usuarioId, usuarioEmail) {
            log(`✅ cambiarRolUsuario('${usuarioId}', '${usuarioEmail}')`);
            alert(`Modal: Cambiar Rol\n\nUsuario: ${usuarioEmail}\nID: ${usuarioId}`);
        }

        function eliminarUsuario(usuarioId, usuarioEmail) {
            log(`✅ eliminarUsuario('${usuarioId}', '${usuarioEmail}')`);
            alert(`Modal: Eliminar\n\nUsuario: ${usuarioEmail}\nID: ${usuarioId}\n\n¿Estás seguro?`);
        }

        function log(mensaje) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${timestamp}] ${mensaje}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function limpiarLog() {
            document.getElementById('log').innerHTML = '[Log limpio]';
        }

        function ejecutarTests() {
            console.clear();
            console.log('=== TESTS DE EVENTO DELEGATION ===\n');
            
            console.log('Test 1: ¿Existen las funciones?');
            console.log('  typeof cambiarRolUsuario:', typeof cambiarRolUsuario);
            console.log('  typeof eliminarUsuario:', typeof eliminarUsuario);
            
            console.log('\nTest 2: ¿Existen los botones?');
            console.log('  .btn-cambiar-rol count:', document.querySelectorAll('.btn-cambiar-rol').length);
            console.log('  .btn-eliminar-usuario count:', document.querySelectorAll('.btn-eliminar-usuario').length);
            
            console.log('\nTest 3: ¿Tienen data-attributes?');
            const btn1 = document.querySelector('.btn-cambiar-rol');
            console.log('  primer btn-cambiar-rol:', {
                'data-usuario-id': btn1?.getAttribute('data-usuario-id'),
                'data-usuario-email': btn1?.getAttribute('data-usuario-email')
            });
            
            console.log('\nTest 4: Event Delegation está activo');
            console.log('  ✅ Event listener en document listo');
            console.log('  ✅ Usa .closest() para detectar clics');
            
            console.log('\n=== PRUEBA COMPLETADA ===');
            alert('✅ Tests ejecutados\n\nAbre F12 → Console para ver los resultados');
        }

        // Log inicial
        window.addEventListener('load', function() {
            log('Página cargada. Event Delegation activo.');
        });
    </script>
</body>
</html>
